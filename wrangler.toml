name = "bluedot-rag"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Vars (non-secret, set via setup script)
[vars]
OPENAI_EXTRACTION_MODEL = "gpt-5.4-nano"
NOTION_TRANSCRIPTS_DATA_SOURCE_ID = "e22e1006-52c9-48f3-85c6-a55c5cc6d991"
NOTION_FOLLOWUPS_DATA_SOURCE_ID = "f04d875e-00a1-4241-8ee1-c73217310212"

[[d1_databases]]
binding = "DB"
database_name = "bluedot-rag-db"
database_id = "8aab7a8b-e319-4f96-a1ce-175540a266cc"
migrations_dir = "drizzle"

[[vectorize]]
binding = "VECTORIZE"
index_name = "bluedot-rag-vectors"
remote = true

# Secrets (set via `wrangler secret put`):
# - OPENAI_API_KEY
# - NOTION_INTEGRATION_KEY
# - BLUEDOT_WEBHOOK_SECRET

[observability]
enabled = true
